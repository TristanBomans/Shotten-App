name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag for the release (example: mobile-v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Optional display name for the release"
        required: false
        default: ""
        type: string

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Validate Expo token
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "Missing EXPO_TOKEN secret. Add it in repository secrets before running this workflow."
            exit 1
          fi

      - name: Install mobile dependencies
        run: bun install --cwd mobile --frozen-lockfile

      - name: Build Android artifact with EAS
        id: eas
        working-directory: mobile
        run: |
          BUILD_JSON="$(bunx eas-cli@latest build --platform android --profile preview --non-interactive --wait --json)"
          printf '%s\n' "${BUILD_JSON}" > "${RUNNER_TEMP}/eas-build.json"

          BUILD_URL="$(jq -r 'if type=="array" then .[0].artifacts.buildUrl // empty else .artifacts.buildUrl // empty end' "${RUNNER_TEMP}/eas-build.json")"
          BUILD_ID="$(jq -r 'if type=="array" then .[0].id // empty else .id // empty end' "${RUNNER_TEMP}/eas-build.json")"

          if [ -z "${BUILD_URL}" ]; then
            echo "Could not resolve buildUrl from EAS output:"
            cat "${RUNNER_TEMP}/eas-build.json"
            exit 1
          fi

          echo "build_url=${BUILD_URL}" >> "${GITHUB_OUTPUT}"
          echo "build_id=${BUILD_ID}" >> "${GITHUB_OUTPUT}"

      - name: Download APK artifact
        id: artifact
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          SAFE_TAG="${TAG//\//-}"
          ASSET_NAME="shotten-android-${SAFE_TAG}.apk"
          curl -L "${{ steps.eas.outputs.build_url }}" --output "${RUNNER_TEMP}/${ASSET_NAME}"
          echo "asset_name=${ASSET_NAME}" >> "${GITHUB_OUTPUT}"
          echo "asset_path=${RUNNER_TEMP}/${ASSET_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release metadata
        id: release_meta
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          NAME="${{ github.event.inputs.release_name }}"
          if [ -z "${NAME}" ]; then
            NAME="Shotten Android ${TAG}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: ${{ steps.artifact.outputs.asset_path }}
          generate_release_notes: true
          body: |
            Android build generated via GitHub Actions.

            - EAS profile: `preview`
            - EAS build ID: `${{ steps.eas.outputs.build_id }}`
